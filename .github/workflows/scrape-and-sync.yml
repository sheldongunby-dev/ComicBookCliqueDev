name: Scrape & Sync Squarespace Content

on:
  schedule:
    # Runs every hour (at the top of the hour)
    - cron: '0 * * * *'
  # Allows you to manually trigger the sync from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Scraper & Keystatic Migration
        run: pnpm run scrape

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Only stage the generated content files
          git add src/content/
          
          # Check if there are changes before committing
          if git diff --staged --quiet; then
            echo "No content changes detected. Skipping push."
          else
            git commit -m "chore: auto-sync content from Squarespace [skip ci]"
            git push
          fi
